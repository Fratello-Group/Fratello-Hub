name: Deploy Firestore rules

# Whenever firestore.rules changes on main, deploy it to Firebase automatically,
# so the live security rules always match the file in the repo — no manual
# console paste. Can also be run by hand from the Actions tab ("Run workflow").
on:
  push:
    branches: [main]
    paths:
      - 'firestore.rules'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write the service-account key from the secret
        run: printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/firebase-key.json"

      - name: Deploy Firestore rules
        run: firebase deploy --only firestore:rules --project fratello-hub --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-key.json
