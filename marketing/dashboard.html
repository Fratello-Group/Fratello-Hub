<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratello Hub - Marketing Dashboard</title>
    <link rel="icon" type="image/png" href="../assets/Fratello_Favicon_Blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/system/embed.css">
    <script src="../system/firebase-config.js"></script>
</head>
<body class="auth-checking">
    <div id="fratello-hub-header"></div>
    <script src="/system/hub-header.js"></script>
    <div class="shell">
        <header class="hub-bar">
            <div class="brand">
                <img src="../assets/Fratello_Logo_Black.png" alt="Fratello">
                <div class="context">
                    <div class="eyebrow">Marketing</div>
                    <div class="title">Marketing Dashboard</div>
                </div>
            </div>
            <div class="actions">
                <a class="button" href="../index.html">Back to Hub</a>
                <a class="button primary" href="https://fratello-dashboard.vercel.app/" target="_blank" rel="noopener noreferrer">Open Full Screen</a>
            </div>
        </header>

        <main class="frame-wrap" id="frameWrap">
            <iframe
                title="Marketing Dashboard"
                src="https://fratello-dashboard.vercel.app/"
                loading="eager"
            ></iframe>
        </main>

        <section class="blocked" id="blocked">
            <div class="blocked-card">
                <h1>Marketing access only.</h1>
                <p>This dashboard is reserved for the Marketing area of the Hub. Sign in with a Marketing, Controller, or Owner profile to view it.</p>
                <a class="button primary" href="../index.html">Back to Hub</a>
            </div>
        </section>
    </div>

    <script type="module">
        import { guardEmbed } from '/system/embed-guard.js';
        guardEmbed(['owner', 'controller', 'marketing']);
    </script>
</body>
</html>
