<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratello Food Safety — Department</title>
    <link rel="icon" type="image/png" href="/assets/Fratello_Favicon_Blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/cfia/system/cfia-tokens.css">
    <link rel="stylesheet" href="/cfia/system/cfia.css">
    <script src="/system/firebase-config.js"></script>
</head>
<body class="cfia-checking">
    <div id="fratello-hub-header"></div>
    <script src="/system/hub-header.js"></script>

    <header class="cfia-bar">
        <div class="brand">
            <div class="context">
                <div class="eyebrow">Food Safety · Department</div>
                <div class="bar-title" id="barTitle">Packaging</div>
            </div>
        </div>
        <div class="actions">
            <a class="btn btn-primary" href="/cfia/index.html">Food Safety Dashboard</a>
        </div>
    </header>

    <section class="blocked" id="blocked">
        <div class="blocked-card">
            <h1>Hub sign-in required.</h1>
            <p>The Food Safety area is part of the Fratello Ops Hub. Please sign in first, then open this page again.</p>
            <a class="btn btn-primary" href="/index.html">Go to Hub sign-in</a>
        </div>
    </section>

    <main class="cfia-page">
        <nav class="crumbs" aria-label="Breadcrumb">
            <a href="/index.html">Hub</a><span class="crumb-sep">›</span>
            <a href="/cfia/index.html">Food Safety</a><span class="crumb-sep">›</span>
            <span class="crumb-current" id="crumbDept">Packaging</span>
        </nav>

        <section class="hero">
            <div class="dateline">Department binder</div>
            <h1 id="deptTitle">Packaging</h1>
            <p id="deptBlurb"></p>
        </section>

        <div class="dept-switch" id="deptSwitch"></div>
        <div id="mapMount"></div>
    </main>

    <script type="module">
        import { guardPage, escapeHtml } from '/cfia/system/cfia-core.js';
        import { DEPARTMENTS, DEPARTMENT_ORDER, DOC_TYPE_GROUPS, getDepartment, docInDepartment } from '/cfia/config/departments.js';
        import { DOCUMENT_REGISTER } from '/cfia/config/document-register.js';
        import { renderSystemsMap } from '/cfia/system/cfia-map.js';

        const params = new URLSearchParams(location.search);
        let deptKey = params.get('dept') || 'packaging';
        if (!DEPARTMENTS[deptKey]) deptKey = 'packaging';

        function renderSwitch() {
            document.getElementById('deptSwitch').innerHTML = DEPARTMENT_ORDER.map(k => {
                const d = DEPARTMENTS[k];
                const on = k === deptKey ? ' on' : '';
                return `<a class="dept-chip${on}" href="/cfia/department.html?dept=${k}"><i class="ti ${d.icon}" aria-hidden="true"></i> ${escapeHtml(d.label)}</a>`;
            }).join('');
        }

        function render() {
            const dept = getDepartment(deptKey);
            document.getElementById('barTitle').textContent = dept.label;
            document.getElementById('deptTitle').textContent = dept.label;
            document.getElementById('deptBlurb').textContent = dept.blurb;
            document.getElementById('crumbDept').textContent = dept.label;
            renderSwitch();
            const docs = DOCUMENT_REGISTER
                .filter(d => docInDepartment(d, deptKey))
                .sort((a, b) => (a.code || 'zz').localeCompare(b.code || 'zz', undefined, { numeric: true }));
            renderSystemsMap({ mount: document.getElementById('mapMount'), docs, groups: DOC_TYPE_GROUPS });
        }

        guardPage(role => { if (role) render(); });
    </script>
</body>
</html>
