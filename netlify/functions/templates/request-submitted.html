<h1>{{requester_name}} has requested time off.</h1>
<p>Please review this vacation request in the Hub.</p>
<div class="details">
    <span class="label">Dates</span>
    {{date_range}}
    <span class="label">Duration</span>
    {{duration}}
    <span class="label">Notes</span>
    {{notes}}
    <span class="label">Calendar conflicts</span>
    {{conflicts}}
</div>
<p><a class="button" href="{{action_url}}">Review request</a></p>
