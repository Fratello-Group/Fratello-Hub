<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratello Hub - Wholesale Proposal Builder</title>
    <link rel="icon" type="image/png" href="../assets/Fratello_Favicon_Blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --black: #1A1A1A;
            --cream: #F5F5F7;
            --teal: #36B3AF;
            --teal-bright: #00D4C8;
            --grey-light: #C4C3C0;
            --divider-dark: #2E2E2E;
            --font: 'Montserrat', Helvetica, Arial, sans-serif;
        }

        html, body {
            height: 100%;
            background: var(--page-bg);
            color: var(--cream);
            font-family: var(--font);
            -webkit-font-smoothing: antialiased;
        }

        .shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hub-bar {
            min-height: 70px;
            padding: 16px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            background: rgba(26, 26, 26, 0.96);
            border-bottom: 1px solid var(--divider-dark);
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 18px;
            min-width: 0;
        }

        .brand img {
            width: 164px;
            height: auto;
            display: block;
        }

        .context {
            padding-left: 18px;
            border-left: 1px solid var(--divider-dark);
            min-width: 0;
        }

        .eyebrow {
            color: var(--teal);
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .title {
            color: var(--cream);
            font-size: 15px;
            font-weight: 800;
            line-height: 1.25;
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 10px 14px;
            border: 1px solid var(--divider-dark);
            border-radius: 4px;
            background: transparent;
            color: var(--grey-light);
            text-decoration: none;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
        }

        .button:hover {
            color: var(--cream);
            border-color: var(--teal);
        }

        .button.primary {
            background: var(--teal);
            border-color: var(--teal);
            color: var(--black);
        }

        .button.primary:hover {
            background: var(--teal-bright);
            border-color: var(--teal-bright);
        }

        .frame-wrap {
            flex: 1;
            min-height: 0;
            position: relative;
            background: #0d0d0d;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 70px);
            border: 0;
            display: block;
            background: #0d0d0d;
        }

        .blocked {
            min-height: calc(100vh - 70px);
            display: none;
            place-items: center;
            padding: 32px;
            text-align: center;
        }

        .blocked-card {
            max-width: 620px;
        }

        .blocked h1 {
            font-size: clamp(34px, 6vw, 58px);
            line-height: 1.05;
            margin-bottom: 18px;
        }

        .blocked p {
            color: var(--grey-light);
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 26px;
        }

        body.denied iframe,
        body.denied .frame-wrap,
        body.auth-checking iframe,
        body.auth-checking .frame-wrap {
            display: none;
        }

        body.denied .blocked,
        body.auth-checking .blocked {
            display: grid;
        }

        /* Light Hub refresh */
        :root {
            --cream: #F5F5F7;
            --grey-light: #5A5A5E;
            --divider-dark: #E5E5E7;
            --page-bg: #F5F5F7;
        }

        html,
        body {
            background: var(--page-bg);
            color: var(--black);
        }

        .hub-bar {
            background: rgba(255, 255, 255, 0.96);
            border-bottom: 1px solid var(--divider-dark);
            box-shadow: 0 1px 2px rgba(15, 17, 17, 0.04);
        }

        .context {
            border-left-color: var(--divider-dark);
        }

        .title {
            color: var(--black);
        }

        .button {
            color: var(--slate);
            border-color: var(--divider-dark);
        }

        .button:hover {
            color: var(--black);
            border-color: var(--teal);
        }

        .frame-wrap,
        iframe {
            background: var(--page-bg);
        }

        @media (max-width: 760px) {
            .hub-bar {
                align-items: flex-start;
                flex-direction: column;
                padding: 18px;
            }

            .brand {
                align-items: flex-start;
                flex-direction: column;
                gap: 12px;
            }

            .context {
                border-left: 0;
                padding-left: 0;
            }

            .actions {
                width: 100%;
                justify-content: flex-start;
            }

            iframe { height: calc(100vh - 148px); }
        }
    </style>
    <script src="../system/firebase-config.js"></script>
    <link rel="stylesheet" href="../system/fratello-ui.css">
</head>
<body class="auth-checking">
    <div id="fratello-hub-header"></div>
    <script src="/system/hub-header.js"></script>
    <div class="shell">
        <header class="hub-bar">
            <div class="brand">
                <img src="../assets/Fratello_Logo_Black.png" alt="Fratello">
                <div class="context">
                    <div class="eyebrow">Sales Tool</div>
                    <div class="title">Wholesale Proposal Builder</div>
                </div>
            </div>
            <div class="actions">
                <a class="button" href="../index.html">Back to Hub</a>
                <a class="button primary" href="https://fratello-proposal-builder.vercel.app/" target="_blank" rel="noopener noreferrer">Open Full Screen</a>
            </div>
        </header>

        <main class="frame-wrap" id="frameWrap">
            <iframe
                title="Wholesale Proposal Builder"
                src="https://fratello-proposal-builder.vercel.app/"
                loading="eager"
            ></iframe>
        </main>

        <section class="blocked" id="blocked">
            <div class="blocked-card">
                <h1>Sales access only.</h1>
                <p>This tool is reserved for the Sales area of the Hub. Sign in with a Sales, Controller, or Owner profile to use it.</p>
                <a class="button primary" href="../index.html">Back to Hub</a>
            </div>
        </section>
    </div>

    <script type="module">
        import { firebaseConfigured, onHubAuthChange } from '../system/fratello-auth.js';

        const allowed = new Set(['owner', 'controller', 'sales']);

        function denyAccess() {
            document.body.classList.remove('auth-checking');
            document.body.classList.add('denied');
        }

        function allowAccess() {
            document.body.classList.remove('auth-checking', 'denied');
        }

        function roleFromLocalStorage() {
            try {
                return JSON.parse(localStorage.getItem('fratello-role') || 'null');
            } catch (error) {
                return null;
            }
        }

        if (firebaseConfigured()) {
            onHubAuthChange(role => {
                if (role && allowed.has(role.key)) allowAccess();
                else denyAccess();
            });
        } else {
            const role = roleFromLocalStorage();
            if (role && allowed.has(role.key)) allowAccess();
            else denyAccess();
        }
    </script>
</body>
</html>
