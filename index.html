<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fratello Ops Hub</title>
    <link rel="icon" type="image/png" href="assets/Fratello_Favicon_Blue.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Fratello Ops Hub - Dark Minimal Editorial */

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --black: #1A1A1A;
            --cream: #F6F1E9;
            --teal: #36B3AF;
            --teal-bright: #00D4C8;
            --white: #FFFFFF;
            --slate: #4A4A4A;
            --grey: #908F8A;
            --grey-light: #C4C3C0;
            --card-bg-dark: #232323;
            --divider-dark: #2E2E2E;
            --error: #D9533D;
            --font: 'Montserrat', Helvetica, Arial, sans-serif;
        }

        html, body {
            background: var(--black);
            color: var(--cream);
            font-family: var(--font);
            font-weight: 400;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
        }

        button { font-family: inherit; }

        /* ────────────────────────────────────────────
           LOGIN
           ──────────────────────────────────────────── */

        .login-screen {
            position: fixed;
            inset: 0;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .login-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 0 32px;
            text-align: center;
        }

        .login-logo {
            width: 260px;
            max-width: 70vw;
            height: auto;
            margin: 0 auto 64px;
            display: block;
        }

        .login-input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        .login-input {
            width: 100%;
            padding: 18px 22px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 4px;
            color: #FFFFFF;
            font-family: var(--font);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0;
            outline: none;
            transition: border-color 0.25s ease, background 0.25s ease;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.35);
            font-weight: 400;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 12px;
        }

        .login-input:focus {
            border-color: var(--teal);
            background: rgba(255, 255, 255, 0.06);
        }

        .login-input.error {
            border-color: var(--error);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-error {
            font-size: 11px;
            color: var(--error);
            margin-bottom: 18px;
            margin-top: 6px;
            height: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .login-error.visible { opacity: 1; }

        .login-btn {
            width: 100%;
            padding: 18px;
            background: var(--teal);
            color: #FFFFFF;
            border: none;
            border-radius: 4px;
            font-family: var(--font);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.1s ease;
        }

        .login-btn:hover { background: var(--teal-bright); color: var(--black); }
        .login-btn:active { transform: scale(0.99); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .login-footer {
            margin-top: 72px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* ────────────────────────────────────────────
           DASHBOARD
           ──────────────────────────────────────────── */

        .dashboard {
            display: none;
            min-height: 100vh;
            background: var(--black);
        }

        .dashboard.active { display: block; }

        /* ── Masthead ── */

        .masthead {
            max-width: 1120px;
            margin: 0 auto;
            padding: 32px 40px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .masthead-logo {
            height: 32px;
            width: auto;
            display: block;
        }

        .masthead-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .masthead-role {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--teal);
        }

        .signout-btn {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--grey-light);
            background: none;
            border: 1px solid var(--divider-dark);
            border-radius: 4px;
            padding: 10px 14px;
            cursor: pointer;
            transition: border-color 0.25s ease, color 0.25s ease;
        }

        .signout-btn:hover { color: var(--cream); border-color: var(--teal); }

        /* ── Main ── */

        .main {
            max-width: 1120px;
            margin: 0 auto;
            padding: 56px 40px 88px;
        }

        /* ── Greeting block (small, not the hero) ── */

        .greeting-block {
            margin-bottom: 64px;
            max-width: 720px;
        }

        .dateline {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--teal);
            margin-bottom: 16px;
        }

        .greeting {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.12;
            letter-spacing: 0;
            color: var(--cream);
        }

        .greeting-note {
            margin-top: 14px;
            color: var(--grey-light);
            font-size: 15px;
            line-height: 1.7;
        }

        /* ── Group label ── */

        .group {
            margin-bottom: 56px;
        }

        .group:last-child { margin-bottom: 0; }

        .group-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--grey);
            margin-bottom: 16px;
            padding-left: 4px;
        }

        /* ── Section: the expandable unit ── */

        .section {
            border-top: 1px solid var(--divider-dark);
        }

        .group .section:last-child {
            border-bottom: 1px solid var(--divider-dark);
        }

        .section-header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            padding: 26px 4px;
            background: none;
            border: none;
            cursor: pointer;
            text-align: left;
            transition: color 0.25s ease;
        }

        .section-header:hover .section-title {
            color: var(--teal);
        }

        .section-copy {
            min-width: 0;
        }

        .section-title {
            display: block;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.25;
            color: var(--cream);
            letter-spacing: 0;
            transition: color 0.25s ease;
        }

        .section-access {
            display: block;
            margin-top: 8px;
            color: var(--grey);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            line-height: 1.5;
            text-transform: uppercase;
        }

        .section-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            position: relative;
        }

        .section-toggle::before,
        .section-toggle::after {
            content: '';
            position: absolute;
            background: var(--grey-light);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
        }

        .section-toggle::before {
            width: 16px;
            height: 1.5px;
        }

        .section-toggle::after {
            width: 1.5px;
            height: 16px;
        }

        .section-header:hover .section-toggle::before,
        .section-header:hover .section-toggle::after {
            background: var(--teal);
        }

        .section.open .section-toggle::after {
            transform: rotate(90deg);
        }

        /* ── Section body (collapsed by default) ── */

        .section-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .section.open .section-body {
            max-height: 1200px;
        }

        .section-body-inner {
            padding: 0 0 32px;
        }

        /* ── Tool list (inside expanded section) ── */

        .tool-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        .tool {
            min-height: 118px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            padding: 20px 22px;
            border-radius: 4px;
            border: 1px solid var(--divider-dark);
            border-left: 3px solid var(--teal);
            text-decoration: none;
            color: var(--cream);
            background: var(--card-bg-dark);
            transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
        }

        .tool.active:hover {
            background: #262626;
            border-color: var(--teal);
        }

        .tool-copy {
            min-width: 0;
        }

        .tool-name,
        .tool-desc {
            display: block;
        }

        .tool-name {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0;
            line-height: 1.4;
        }

        .tool-desc {
            margin-top: 8px;
            color: var(--grey-light);
            font-size: 13px;
            line-height: 1.55;
        }

        .tool-status {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--grey);
            white-space: nowrap;
            align-self: flex-start;
        }

        .tool.inactive { cursor: default; }
        .tool.inactive { border-left-color: var(--divider-dark); }
        .tool.inactive:hover { background: var(--card-bg-dark); border-color: var(--divider-dark); }
        .tool.inactive .tool-name { color: var(--grey-light); }

        /* ── Footer ── */

        .footer {
            max-width: 1120px;
            margin: 0 auto;
            padding: 48px 40px 56px;
            border-top: 1px solid var(--divider-dark);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--grey);
            line-height: 1.9;
        }

        .footer-accent {
            display: block;
            margin-top: 6px;
            font-size: 11px;
            font-weight: 400;
            color: var(--grey);
            letter-spacing: 3px;
        }

        /* ── Fade in on load ── */

        .fade-in {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeIn 0.7s ease forwards;
        }

        .fade-in:nth-child(1) { animation-delay: 0.05s; }
        .fade-in:nth-child(2) { animation-delay: 0.12s; }
        .fade-in:nth-child(3) { animation-delay: 0.20s; }
        .fade-in:nth-child(4) { animation-delay: 0.28s; }
        .fade-in:nth-child(5) { animation-delay: 0.36s; }

        @keyframes fadeIn {
            to { opacity: 1; transform: translateY(0); }
        }

        /* ────────────────────────────────────────────
           MOBILE
           ──────────────────────────────────────────── */

        @media (max-width: 720px) {
            .masthead {
                padding: 28px 24px 0;
                gap: 16px;
            }
            .masthead-logo { height: 28px; }
            .masthead-right { gap: 16px; }
            .masthead-role { display: none; }

            .main {
                padding: 40px 24px 64px;
            }

            .greeting-block { margin-bottom: 44px; }
            .dateline { font-size: 11px; }
            .greeting { font-size: 30px; }
            .greeting-note { font-size: 14px; }

            .group { margin-bottom: 40px; }
            .group-label { font-size: 11px; margin-bottom: 12px; letter-spacing: 4px; }

            .section-header { padding: 22px 4px; }
            .section-title { font-size: 21px; }
            .section-access { font-size: 10px; letter-spacing: 2px; }
            .section-toggle { width: 28px; height: 28px; }
            .section-toggle::before { width: 14px; }
            .section-toggle::after { height: 14px; }

            .tool-list { grid-template-columns: 1fr; }
            .tool { min-height: 0; padding: 18px 16px; align-items: flex-start; }
            .tool-name { font-size: 14px; }
            .tool-desc { font-size: 12px; }
            .tool-status { font-size: 10px; letter-spacing: 2px; }

            .footer {
                padding: 40px 24px 48px;
                font-size: 11px;
            }
        }

        @media (hover: none) {
            .tool.active:hover { background: var(--card-bg-dark); }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     LOGIN
     ═══════════════════════════════════════════════ -->

<div class="login-screen" id="loginScreen">
    <div class="login-container">
        <img src="assets/Fratello_Logo_White.png" alt="Fratello" class="login-logo">
        <form onsubmit="event.preventDefault(); handleLogin();">
            <div class="login-input-wrap">
                <input
                    type="password"
                    class="login-input"
                    id="accessCode"
                    placeholder="Access Code"
                    autocomplete="off"
                    autofocus
                >
            </div>
            <div class="login-error" id="loginError">Invalid access code</div>
            <button type="submit" class="login-btn" id="loginBtn">Enter</button>
        </form>
        <div class="login-footer">Internal &middot; Fratello Group Inc.</div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════
     DASHBOARD
     ═══════════════════════════════════════════════ -->

<div class="dashboard" id="dashboard">
    <div class="masthead">
        <img src="assets/Fratello_Logo_White.png" alt="Fratello" class="masthead-logo">
        <div class="masthead-right">
            <span class="masthead-role" id="roleLabel"></span>
            <button class="signout-btn" onclick="signOut()">Sign Out</button>
        </div>
    </div>

    <div class="main" id="mainContent">
        <!-- Populated by JavaScript based on role -->
    </div>

    <div class="footer">
        Fratello Group Inc. &nbsp;·&nbsp; 4021 9 St SE &nbsp;·&nbsp; Calgary AB
        <span class="footer-accent">Serving exceptional coffee with style — since 1974</span>
    </div>
</div>

<script>
// ════════════════════════════════════════════════
// ROLE CONFIGURATION
// ════════════════════════════════════════════════
//
// Passwords are stored server-side in Netlify environment
// variables. The client sends the code to /.netlify/functions/auth
// which validates it and returns the role. No passwords exist
// in this file.
//

// ════════════════════════════════════════════════
// SECTION & CARD DEFINITIONS
// ════════════════════════════════════════════════

const SECTIONS = {

    // ── Department Tools ──

    finance: {
        group: 'Departments',
        label: 'Finance',
        access: 'Owner + Controller',
        cards: [
            { title: 'Financial Dashboards', desc: 'Monthly operating numbers, cash position, and KPI reporting.', href: '#', badge: 'In Preparation' },
            { title: 'D2C Scenario Model',   desc: 'Planning model for direct-to-consumer growth decisions.', href: '#', badge: 'In Preparation' },
            { title: 'Costing & Margins',    desc: 'Product margin review and pricing support for leadership.', href: '#', badge: 'In Preparation' }
        ]
    },

    production: {
        group: 'Departments',
        label: 'Production',
        access: 'Production + Leadership',
        cards: [
            { title: 'Roasting',              desc: 'Roast planning, batch records, and production notes.', href: '#', badge: 'In Preparation' },
            { title: 'Packaging & Warehouse', desc: 'Packaging workflow, warehouse priorities, and inventory support.', href: '#', badge: 'In Preparation' },
            { title: 'Production Planning',   desc: 'Weekly capacity planning for roasting, packaging, and fulfillment.', href: '#', badge: 'In Preparation' },
            { title: 'Health & Safety',       desc: 'Safety documents, incident follow-up, and compliance resources.', href: '#', badge: 'In Preparation' }
        ]
    },

    sales: {
        group: 'Departments',
        label: 'Sales',
        access: 'Sales + Leadership',
        cards: [
            { title: 'Sales Intelligence', desc: 'Account insights, territory context, and prospecting tools.', href: '#', badge: 'In Preparation' },
            { title: 'Sales Forecasting',  desc: 'Pipeline planning and monthly sales visibility.', href: '#', badge: 'In Preparation' }
        ]
    },

    marketing: {
        group: 'Departments',
        label: 'Marketing',
        access: 'Marketing + Leadership',
        cards: [
            { title: 'Brand & Creative',    desc: 'Brand system files, campaign references, and creative tools.', href: '#', badge: 'In Preparation' },
            { title: 'Product Catalogs',    desc: 'Wholesale and retail product catalog resources.', href: '#', badge: 'In Preparation' },
            { title: 'D2C Marketing Tools', desc: 'Shopify, email, and campaign planning resources.', href: '#', badge: 'In Preparation' }
        ]
    },

    // ── Company-Wide ──

    operations: {
        group: 'Company-Wide',
        label: 'Operations',
        access: 'All team access',
        cards: [
            { title: 'Forms',          desc: 'Everyday forms and request workflows for the team.', href: '#', badge: 'In Preparation' },
            { title: 'SOPs & Manuals', desc: 'Operating procedures, manuals, and shared reference material.', href: '#', badge: 'In Preparation' }
        ]
    },

    'hr-open': {
        group: 'Company-Wide',
        label: 'Employee Resources',
        access: 'All team access',
        cards: [
            { title: 'Employee Handbook', desc: 'Shared team policies and employment reference material.', href: '#', badge: 'In Preparation' },
            { title: 'Leave & Time Off',  desc: 'Vacation, absence, and time-off guidance.', href: '#', badge: 'In Preparation' },
            { title: 'HR Forms',          desc: 'Common people forms for staff and managers.', href: '#', badge: 'In Preparation' }
        ]
    },

    // ── Management (Owner, Controller, Production, Marketing, Sales) ──

    'hr-hiring': {
        group: 'Management',
        label: 'Hiring & Recruitment',
        access: 'Owner + Controller + Managers',
        cards: [
            {
                title: 'Hiring Document Generator',
                desc: 'Generate offer letters, employment agreements, and job descriptions as downloadable PDFs. Includes role presets for all Fratello positions.',
                href: 'hr/hiring/hiring-document-generator.html'
            }
        ]
    },

    // ── Confidential (Owner + Controller) ──

    'hr-confidential': {
        group: 'Confidential',
        label: 'HR & People Management',
        access: 'Owner + Controller',
        cards: [
            { title: 'Performance Reviews',  desc: 'Manager review records and people-performance workflows.', href: '#', badge: 'In Preparation' },
            { title: 'Wages & Compensation', desc: 'Compensation planning and wage review tools.', href: '#', badge: 'In Preparation' },
            { title: 'Employee Records',     desc: 'Confidential employee documentation and records.', href: '#', badge: 'In Preparation' }
        ]
    },

    // ── System (Owner only) ──

    system: {
        group: 'System & Admin',
        label: 'System',
        access: 'Owner only',
        cards: [
            { title: 'Hub Admin',     desc: 'Portal administration and access planning.', href: '#', badge: 'In Preparation' },
            { title: 'Integrations',  desc: 'Future Odoo, Shopify, and reporting connections.', href: '#', badge: 'In Preparation' },
            { title: 'Tool Registry', desc: 'Master list of active and planned Hub tools.', href: 'docs/TOOL-REGISTRY.md' }
        ]
    }
};

// ════════════════════════════════════════════════
// LOGIN LOGIC  ─  UNCHANGED FROM ORIGINAL
// ════════════════════════════════════════════════

async function handleLogin() {
    const code = document.getElementById('accessCode').value.trim();
    const btn = document.getElementById('loginBtn');

    if (!code) return;

    btn.disabled = true;
    btn.textContent = '...';

    try {
        const response = await fetch('/.netlify/functions/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code: code })
        });

        if (response.ok) {
            const data = await response.json();
            localStorage.setItem('fratello-role', JSON.stringify(data.role));
            showDashboard(data.role);
        } else {
            const input = document.getElementById('accessCode');
            const error = document.getElementById('loginError');
            input.classList.add('error');
            error.classList.add('visible');
            setTimeout(() => input.classList.remove('error'), 400);
            setTimeout(() => error.classList.remove('visible'), 2500);
        }
    } catch (e) {
        const error = document.getElementById('loginError');
        error.textContent = 'Connection error — try again';
        error.classList.add('visible');
        setTimeout(() => {
            error.textContent = 'Invalid access code';
            error.classList.remove('visible');
        }, 3000);
    }

    btn.disabled = false;
    btn.textContent = 'Enter';
}

// ════════════════════════════════════════════════
// DASHBOARD RENDERING
// ════════════════════════════════════════════════

function formatDateline() {
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${days[now.getDay()]} \u00B7 ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

function showDashboard(role) {
    document.getElementById('loginScreen').classList.add('hidden');

    const dashboard = document.getElementById('dashboard');
    dashboard.classList.add('active');

    document.getElementById('roleLabel').textContent = role.label;

    const main = document.getElementById('mainContent');
    main.innerHTML = '';

    // Greeting block — small, supporting, not the hero
    const hour = new Date().getHours();
    let greetWord = 'Good evening.';
    if (hour < 12) greetWord = 'Good morning.';
    else if (hour < 17) greetWord = 'Good afternoon.';

    const greetingBlock = document.createElement('div');
    greetingBlock.className = 'greeting-block fade-in';
    greetingBlock.innerHTML = `
        <div class="dateline">${formatDateline()}</div>
        <h1 class="greeting">${greetWord}</h1>
        <p class="greeting-note">Your Hub view is filtered for ${role.label} access.</p>
    `;
    main.appendChild(greetingBlock);

    // Group sections by their group label
    const groups = {};
    role.sections.forEach(sectionKey => {
        const section = SECTIONS[sectionKey];
        if (!section) return;
        if (!groups[section.group]) groups[section.group] = [];
        groups[section.group].push({ key: sectionKey, ...section });
    });

    // Render each group as a labeled stack of expandable sections
    Object.entries(groups).forEach(([groupName, sections]) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'group fade-in';

        const groupLabel = document.createElement('div');
        groupLabel.className = 'group-label';
        groupLabel.textContent = groupName;
        groupDiv.appendChild(groupLabel);

        sections.forEach(section => {
            const sectionDiv = document.createElement('div');
            sectionDiv.className = 'section';
            sectionDiv.dataset.key = section.key;

            // Header (clickable, toggles expansion)
            const header = document.createElement('button');
            header.className = 'section-header';
            header.type = 'button';
            header.innerHTML = `
                <span class="section-copy">
                    <span class="section-title">${section.label}</span>
                    <span class="section-access">${section.access || ''}</span>
                </span>
                <span class="section-toggle" aria-hidden="true"></span>
            `;
            header.addEventListener('click', () => {
                sectionDiv.classList.toggle('open');
            });
            sectionDiv.appendChild(header);

            // Body (collapsed by default)
            const body = document.createElement('div');
            body.className = 'section-body';

            const inner = document.createElement('div');
            inner.className = 'section-body-inner';

            const list = document.createElement('div');
            list.className = 'tool-list';

            section.cards.forEach(card => {
                const isActive = card.href && card.href !== '#';
                const a = document.createElement('a');
                a.className = 'tool ' + (isActive ? 'active' : 'inactive');
                a.href = card.href || '#';
                if (isActive) a.target = '_self';
                if (!isActive) a.addEventListener('click', e => e.preventDefault());

                const copy = document.createElement('span');
                copy.className = 'tool-copy';

                const name = document.createElement('span');
                name.className = 'tool-name';
                name.textContent = card.title;
                copy.appendChild(name);

                if (card.desc) {
                    const desc = document.createElement('span');
                    desc.className = 'tool-desc';
                    desc.textContent = card.desc;
                    copy.appendChild(desc);
                }

                a.appendChild(copy);

                if (card.badge) {
                    const status = document.createElement('span');
                    status.className = 'tool-status';
                    status.textContent = card.badge;
                    a.appendChild(status);
                }

                list.appendChild(a);
            });

            inner.appendChild(list);
            body.appendChild(inner);
            sectionDiv.appendChild(body);

            groupDiv.appendChild(sectionDiv);
        });

        main.appendChild(groupDiv);
    });
}

// ════════════════════════════════════════════════
// SIGN OUT
// ════════════════════════════════════════════════

function signOut() {
    localStorage.removeItem('fratello-role');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('dashboard').classList.remove('active');
    document.getElementById('accessCode').value = '';
    document.getElementById('mainContent').innerHTML = '';
}

// ════════════════════════════════════════════════
// SESSION RESTORE
// ════════════════════════════════════════════════

(function init() {
    const saved = localStorage.getItem('fratello-role');
    if (saved) {
        try {
            const role = JSON.parse(saved);
            showDashboard(role);
        } catch (e) {
            localStorage.removeItem('fratello-role');
        }
    }
})();
</script>
