<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fratello Ops Hub</title>
    <link rel="icon" type="image/png" href="assets/Favicon_Fratello-Blue.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --teal: #36B3AF; --teal-dark: #2A8F8C; --teal-wash: rgba(54,179,175,0.06);
            --black: #111; --white: #FFF; --off-white: #FAFAF9;
            --gray-200: #E8E6E3; --gray-400: #A8A29E; --gray-500: #78716C; --gray-600: #57534E;
            --font: 'Montserrat', -apple-system, sans-serif;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { font-size:16px; -webkit-font-smoothing:antialiased; -webkit-text-size-adjust:100%; }
        body { font-family:var(--font); background:var(--off-white); color:var(--black); min-height:100vh; min-height:100dvh; overscroll-behavior:none; }

        /* ═══ LOGIN ═══ */
        .login {
            min-height:100vh; min-height:100dvh; display:flex; flex-direction:column;
            align-items:center; justify-content:center; background:var(--black); padding:40px 24px; position:relative;
        }
        .login::before {
            content:''; position:absolute; top:15%; left:50%; transform:translateX(-50%);
            width:300px; height:300px; background:radial-gradient(circle, rgba(54,179,175,0.08) 0%, transparent 70%); pointer-events:none;
        }
        .login-logo { position:relative; z-index:1; margin-bottom:8px; }
        .login-logo img { height:clamp(38px, 8vw, 52px); width:auto; display:block; }
        .login-tagline {
            font-size:0.6rem; font-weight:600; letter-spacing:0.4em; text-transform:uppercase;
            color:var(--gray-500); margin-top:6px; z-index:1; position:relative;
        }
        .login-rule { width:28px; height:2px; background:var(--teal); margin:32px 0; z-index:1; position:relative; }
        .login-form { width:100%; max-width:340px; display:flex; flex-direction:column; gap:14px; z-index:1; position:relative; }
        .login-label { font-size:0.6rem; font-weight:600; letter-spacing:0.25em; text-transform:uppercase; color:var(--gray-400); margin-bottom:-6px; }
        .login-input {
            width:100%; padding:14px 0; background:transparent; border:none; border-bottom:1px solid var(--gray-600);
            color:var(--white); font-family:var(--font); font-size:1rem; font-weight:400; letter-spacing:0.02em; outline:none;
            transition:border-color 0.3s ease;
        }
        .login-input:focus { border-color:var(--teal); }
        .login-input::placeholder { color:var(--gray-600); font-weight:300; }
        .login-btn {
            margin-top:12px; padding:16px; background:var(--teal); color:var(--white); border:none; border-radius:0;
            font-family:var(--font); font-weight:700; font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase;
            cursor:pointer; transition:all 0.3s ease;
        }
        .login-btn:hover { background:var(--teal-dark); }
        .login-btn:active { transform:scale(0.98); }
        .login-error { padding:10px 0; color:#E87C7C; font-size:0.75rem; font-weight:500; text-align:center; opacity:0; transition:opacity 0.3s ease; }
        .login-error.show { opacity:1; }
        .login-footer { position:absolute; bottom:24px; font-size:0.6rem; color:var(--gray-600); letter-spacing:0.1em; text-transform:uppercase; }

        /* ═══ HUB ═══ */
        .hub { display:none; min-height:100vh; min-height:100dvh; }
        .hub.active { display:flex; flex-direction:column; }

        .header {
            display:flex; align-items:center; justify-content:space-between; padding:14px 24px;
            position:sticky; top:0; z-index:100; border-bottom:1px solid var(--gray-200);
            -webkit-backdrop-filter:blur(20px); backdrop-filter:blur(20px); background:rgba(250,250,249,0.85);
        }
        .header-logo img { height:28px; width:auto; display:block; }
        .header-right { display:flex; align-items:center; gap:14px; }
        .header-tier { font-size:0.55rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--teal); }
        .header-signout {
            font-size:0.6rem; font-weight:500; letter-spacing:0.08em; text-transform:uppercase;
            color:var(--gray-400); background:none; border:none; cursor:pointer; font-family:var(--font); transition:color 0.2s;
        }
        .header-signout:hover { color:var(--black); }

        .hero { padding:48px 24px 40px; }
        .hero h1 { font-size:clamp(1.8rem, 6vw, 2.8rem); font-weight:800; line-height:1.1; letter-spacing:-0.02em; }
        .hero p { margin-top:10px; font-size:0.85rem; font-weight:400; color:var(--gray-500); line-height:1.5; }

        .section-header { padding:0 24px; margin-bottom:8px; display:flex; align-items:center; gap:16px; }
        .section-header-bar { width:40px; height:3px; background:var(--teal); border-radius:2px; }
        .section-header-text { font-size:0.85rem; font-weight:800; letter-spacing:0.22em; text-transform:uppercase; color:var(--black); }

        .accordion { padding:0 24px; }
        .acc-item { border-bottom:1px solid var(--gray-200); }
        .acc-item:first-child { border-top:1px solid var(--gray-200); }

        .acc-trigger {
            width:100%; display:flex; align-items:center; justify-content:space-between;
            padding:22px 0; background:none; border:none; cursor:pointer; font-family:var(--font);
            text-align:left; -webkit-tap-highlight-color:transparent; transition:opacity 0.2s;
        }
        .acc-trigger:active { opacity:0.7; }
        .acc-trigger-left { display:flex; align-items:baseline; gap:14px; }
        .acc-name {
            font-size:clamp(1.3rem, 5vw, 1.8rem); font-weight:800; color:var(--black);
            letter-spacing:-0.01em; transition:color 0.3s ease;
        }
        .acc-item.open .acc-name { color:var(--teal); }
        .acc-count { font-size:0.65rem; font-weight:600; color:var(--gray-400); letter-spacing:0.05em; }

        .acc-icon { width:24px; height:24px; position:relative; flex-shrink:0; }
        .acc-icon::before, .acc-icon::after {
            content:''; position:absolute; top:50%; left:50%; background:var(--gray-400);
            transition:all 0.35s cubic-bezier(0.25,0.1,0.25,1);
        }
        .acc-icon::before { width:18px; height:2px; transform:translate(-50%,-50%); }
        .acc-icon::after { width:2px; height:18px; transform:translate(-50%,-50%); }
        .acc-item.open .acc-icon::after { transform:translate(-50%,-50%) rotate(90deg); opacity:0; }
        .acc-item.open .acc-icon::before { background:var(--teal); }

        .acc-panel { max-height:0; overflow:hidden; transition:max-height 0.4s cubic-bezier(0.25,0.1,0.25,1); }
        .acc-panel-inner { padding:0 0 24px 0; }
        .acc-desc { font-size:0.78rem; color:var(--gray-500); line-height:1.6; margin-bottom:16px; font-weight:400; }

        .tool-item {
            display:flex; align-items:center; justify-content:space-between;
            padding:14px 16px; background:var(--white); border:1px solid var(--gray-200);
            border-radius:6px; margin-bottom:8px; cursor:pointer;
            transition:all 0.2s ease; -webkit-tap-highlight-color:transparent;
        }
        .tool-item:hover { border-color:var(--teal); background:var(--teal-wash); }
        .tool-item:active { transform:scale(0.99); }
        .tool-name { font-size:0.85rem; font-weight:600; color:var(--black); margin-bottom:1px; }
        .tool-desc { font-size:0.72rem; color:var(--gray-500); font-weight:400; }
        .tool-badge {
            font-size:0.55rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
            padding:3px 8px; border-radius:3px; white-space:nowrap; flex-shrink:0; margin-left:12px;
        }
        .tool-badge.active  { background:rgba(34,197,94,0.08); color:#16A34A; }
        .tool-badge.planned { background:var(--teal-wash); color:var(--teal-dark); }
        .tool-badge.draft   { background:rgba(234,179,8,0.08); color:#CA8A04; }
        .empty-msg { font-size:0.78rem; color:var(--gray-400); font-style:italic; padding:8px 0; }

        .footer { margin-top:auto; padding:32px 24px; text-align:center; }
        .footer-rule { width:28px; height:2px; background:var(--teal); margin:0 auto 16px; }
        .footer-text { font-size:0.6rem; color:var(--gray-400); letter-spacing:0.1em; text-transform:uppercase; line-height:2; }

        @keyframes slideUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .hub.active .acc-item { animation:slideUp 0.5s ease both; }
        .hub.active .acc-item:nth-child(1) { animation-delay:0.05s; }
        .hub.active .acc-item:nth-child(2) { animation-delay:0.08s; }
        .hub.active .acc-item:nth-child(3) { animation-delay:0.11s; }
        .hub.active .acc-item:nth-child(4) { animation-delay:0.14s; }
        .hub.active .acc-item:nth-child(5) { animation-delay:0.17s; }
        .hub.active .acc-item:nth-child(6) { animation-delay:0.20s; }
        .hub.active .acc-item:nth-child(7) { animation-delay:0.23s; }

        @media (min-width:768px) {
            .header { padding:14px 48px; }
            .header-logo img { height:32px; }
            .hero { padding:56px 48px 44px; max-width:800px; }
            .section-header { padding:0 48px; }
            .section-header-text { font-size:0.95rem; }
            .accordion { padding:0 48px; max-width:800px; }
            .footer { padding:48px; }
            .acc-trigger { padding:28px 0; }
            .acc-name { font-size:2rem; }
            .tool-item { padding:16px 20px; }
        }
        @media (min-width:1200px) { .hero, .accordion { margin-left:auto; margin-right:auto; } }
    </style>
</head>
<body>

<div class="login" id="loginScreen">
    <div class="login-logo">
        <img src="assets/Logo_Fratello-White.png" alt="Fratello">
    </div>
    <div class="login-tagline">Operations Hub</div>
    <div class="login-rule"></div>
    <form class="login-form" onsubmit="return handleLogin(event)">
        <label class="login-label">Access Code</label>
        <input type="password" id="accessCode" class="login-input" placeholder="Enter code" autocomplete="off" autofocus />
        <div class="login-error" id="loginError">Invalid access code</div>
        <button type="submit" class="login-btn">Enter</button>
    </form>
    <div class="login-footer">Internal &middot; Fratello Group Inc.</div>
</div>

<div class="hub" id="hub">
    <header class="header">
        <div class="header-logo">
            <img src="assets/fratello.png" alt="Fratello">
        </div>
        <div class="header-right">
            <span class="header-tier" id="tierLabel"></span>
            <button class="header-signout" onclick="logout()">Sign Out</button>
        </div>
    </header>

    <div class="hero">
        <h1 id="heroTitle">Good afternoon.</h1>
        <p>Your tools, dashboards, and workflows &mdash; all in one place.</p>
    </div>

    <div class="section-header">
        <div class="section-header-bar"></div>
        <div class="section-header-text">Departments</div>
    </div>
    <div class="accordion" id="deptAccordion"></div>

    <div id="systemSection" style="display:none;">
        <div class="section-header" style="margin-top:40px;">
            <div class="section-header-bar"></div>
            <div class="section-header-text">System &amp; Admin</div>
        </div>
        <div class="accordion" id="systemAccordion"></div>
    </div>

    <footer class="footer">
        <div class="footer-rule"></div>
        <div class="footer-text">
            Fratello Group Inc. &middot; 4021 9 St SE, Calgary AB<br>
            Serving Exceptional Coffee With Style &middot; Since 1974
        </div>
    </footer>
</div>

<script>
    const TIERS = {
        'fratello-staff-2026':   { name:'Staff',   level:1 },
        'fratello-manager-2026': { name:'Manager', level:2 },
        'fratello-owner-2026':   { name:'Owner',   level:3 }
    };
    let tier = null;

    const departments = [
        { name:'Finance', desc:'Dashboards, costing tools, margin analysis, and financial reporting.', minTier:2,
          tools:[
            { name:'Financial Dashboard', desc:'Monthly P&L, cash flow, and KPI tracking', status:'planned', minTier:3 },
            { name:'Margin Calculator', desc:'Product-level costing and margin analysis', status:'planned', minTier:2 },
            { name:'Budget Tracker', desc:'Department budgets vs. actuals', status:'planned', minTier:3 }
        ]},
        { name:'Production', desc:'Roasting schedules, green inventory, QC, packaging, warehouse, and safety.', minTier:2,
          tools:[
            { name:'Production Planning Engine', desc:'Weekly roast scheduling and capacity planning', status:'planned', minTier:2 },
            { name:'Green Inventory Tracker', desc:'Green coffee stock levels and projections', status:'planned', minTier:2 },
            { name:'QC Log', desc:'Roast quality control and cupping records', status:'planned', minTier:2 },
            { name:'H&S Compliance', desc:'Safety checklists and incident tracking', status:'planned', minTier:1 }
        ]},
        { name:'Sales', desc:'Sales intelligence, territory analysis, pipeline tracking, and forecasting.', minTier:2,
          tools:[
            { name:'Sales Intelligence Report', desc:'Territory performance and customer analysis', status:'planned', minTier:2 },
            { name:'Pipeline Tracker', desc:'New business pipeline and conversion tracking', status:'planned', minTier:2 }
        ]},
        { name:'Marketing', desc:'Brand assets, product catalogs, design skills, and promotional tools.', minTier:2,
          tools:[
            { name:'Brand Guide & Skill', desc:'Fratello brand voice, visual identity, and Claude skill', status:'active', minTier:2 },
            { name:'Product Catalog Generator', desc:'Automated catalog output with current SKUs', status:'planned', minTier:2 }
        ]},
        { name:'HR & People', desc:'Performance reviews, compensation analysis, onboarding, and policies.', minTier:1,
          tools:[
            { name:'Employee Handbook', desc:'Company policies, procedures, and expectations', status:'planned', minTier:1 },
            { name:'Wage Assessment Tool', desc:'Compensation analysis and benchmarking', status:'planned', minTier:2 },
            { name:'Performance Reviews', desc:'Annual review forms and tracking', status:'planned', minTier:2 }
        ]},
        { name:'Operations', desc:'Company-wide forms, SOPs, legal documents, and cross-departmental processes.', minTier:1,
          tools:[
            { name:'Company Forms', desc:'Leave requests, expense claims, general forms', status:'planned', minTier:1 },
            { name:'SOPs & Manuals', desc:'Standard operating procedures library', status:'planned', minTier:1 }
        ]}
    ];

    const systemItems = [
        { name:'System', desc:'Hub settings, tool registry, integrations, and deployment.', minTier:3,
          tools:[
            { name:'Hub Configuration', desc:'Portal settings and access management', status:'active', minTier:3 },
            { name:'Tool Registry', desc:'Master list of all tools, owners, and status', status:'active', minTier:3 },
            { name:'Integrations', desc:'Odoo, Shopify, and Google Sheets API connections', status:'planned', minTier:3 }
        ]}
    ];

    function handleLogin(e) {
        e.preventDefault();
        const code = document.getElementById('accessCode').value.trim();
        if (TIERS[code]) { tier=TIERS[code]; sessionStorage.setItem('fh-tier',JSON.stringify(tier)); openHub(); return false; }
        const err=document.getElementById('loginError'); err.classList.add('show');
        document.getElementById('accessCode').value='';
        setTimeout(()=>err.classList.remove('show'),2500);
        return false;
    }

    function logout() {
        sessionStorage.removeItem('fh-tier'); tier=null;
        document.getElementById('hub').classList.remove('active');
        document.getElementById('loginScreen').style.display='flex';
        document.getElementById('accessCode').value='';
    }

    function openHub() {
        document.getElementById('loginScreen').style.display='none';
        document.getElementById('hub').classList.add('active');
        document.getElementById('tierLabel').textContent=tier.name;
        const h=new Date().getHours();
        document.getElementById('heroTitle').textContent = h<12?'Good morning.':h<17?'Good afternoon.':'Good evening.';
        renderAccordion('deptAccordion',departments);
        if(tier.level>=3){document.getElementById('systemSection').style.display='block';renderAccordion('systemAccordion',systemItems);}
        else{document.getElementById('systemSection').style.display='none';}
    }

    function renderAccordion(id,items) {
        const el=document.getElementById(id); el.innerHTML='';
        items.forEach(dept=>{
            if(tier.level<dept.minTier)return;
            const tools=dept.tools.filter(t=>tier.level>=t.minTier);
            const item=document.createElement('div'); item.className='acc-item';
            item.innerHTML=`
                <button class="acc-trigger" aria-expanded="false">
                    <div class="acc-trigger-left">
                        <span class="acc-name">${dept.name}</span>
                        <span class="acc-count">${tools.length}</span>
                    </div>
                    <span class="acc-icon"></span>
                </button>
                <div class="acc-panel"><div class="acc-panel-inner">
                    <div class="acc-desc">${dept.desc}</div>
                    ${tools.length===0?'<div class="empty-msg">No tools yet.</div>':
                      tools.map(t=>`<div class="tool-item"><div><div class="tool-name">${t.name}</div><div class="tool-desc">${t.desc}</div></div><span class="tool-badge ${t.status}">${t.status}</span></div>`).join('')}
                </div></div>`;
            const trigger=item.querySelector('.acc-trigger'),panel=item.querySelector('.acc-panel');
            trigger.addEventListener('click',()=>{
                const open=item.classList.contains('open');
                if(open){panel.style.maxHeight='0';item.classList.remove('open');trigger.setAttribute('aria-expanded','false');}
                else{panel.style.maxHeight=panel.scrollHeight+'px';item.classList.add('open');trigger.setAttribute('aria-expanded','true');}
            });
            el.appendChild(item);
        });
    }

    (function(){const s=sessionStorage.getItem('fh-tier');if(s){tier=JSON.parse(s);openHub();}})();
</script>
</body>
</html>
